<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtos - Web</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #333; }
        label { display: block; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; margin-top: 20px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Novo Produto</h2>
        <form action="/inserir" method="post">
            <label>Nome do Produto:</label>
            <input type="text" name="nome" placeholder="Ex: Mouse" required>
            
            <label>Preço (R$):</label>
            <input type="number" step="0.01" name="preco" placeholder="Ex: 59.90" required>
            
            <button type="submit">Salvar no PostgreSQL</button>
        </form>
    </div>
</body>
</html>
